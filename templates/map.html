{% extends "base.html" %}
{% block content %}
<h1>🗺️ ASEAN Income Status Map</h1>

<div class="legend">
    <span class="legend-item"><span class="dot" style="background:#27ae60"></span> High Income</span>
    <span class="legend-item"><span class="dot" style="background:#2980b9"></span> Upper-middle Income</span>
    <span class="legend-item"><span class="dot" style="background:#f39c12"></span> Lower-middle Income</span>
    <span class="legend-item"><span class="dot" style="background:#e74c3c"></span> Low Income</span>
</div>

<div id="map"></div>

<div class="slider-box">
    <label for="yearSlider">📅 Year: <strong id="yearLabel">2000</strong></label>
    <input type="range" id="yearSlider" min="0" max="0" value="0" step="1">
</div>

<div class="income-table">
    <h3>📋 Country Income Status — <span id="tableYear">2000</span></h3>
    <table>
        <thead>
            <tr>
                <th>Country</th>
                <th>Region</th>
                <th>Income Group</th>
            </tr>
        </thead>
        <tbody id="incomeTableBody"></tbody>
    </table>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const allData = {{ data | tojson }};
const years = {{ years | tojson }};

const incomeColors = {
    "High Income": "#27ae60",
    "Upper-middle Income": "#2980b9",
    "Lower-middle Income": "#f39c12",
    "Low Income": "#e74c3c"
};

// ISO 3166-1 alpha-3 to alpha-2 mapping for GeoJSON
const codeMap = {
    "BRN": "BN",
    "KHM": "KH",
    "IDN": "ID",
    "LAO": "LA",
    "MYS": "MY",
    "MMR": "MM",
    "PHL": "PH",
    "SGP": "SG",
    "THA": "TH",
    "VNM": "VN"
};

const map = L.map("map").setView([7.0, 110.0], 4);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors"
}).addTo(map);

let geojsonLayer = null;
let currentYearData = {};

// Fetch GeoJSON for ASEAN countries
async function loadGeoJSON() {
    const res = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson");
    const geojson = await res.json();

    // Filter only ASEAN countries
    const aseanCodes = Object.values(codeMap);
    geojson.features = geojson.features.filter(f =>
        aseanCodes.includes(f.properties.ISO_A2)
    );
    return geojson;
}

function getCountryByAlpha2(alpha2, yearData) {
    const alpha3 = Object.entries(codeMap).find(([k, v]) => v === alpha2)?.[0];
    return yearData.find(c => c.id === alpha3);
}

function styleFeature(feature) {
    const alpha2 = feature.properties.ISO_A2;
    const country = getCountryByAlpha2(alpha2, Object.values(currentYearData));
    const color = country ? (incomeColors[country.income] || "#ccc") : "#ccc";
    return {
        fillColor: color,
        weight: 1.5,
        opacity: 1,
        color: "white",
        fillOpacity: 0.75
    };
}

function onEachFeature(feature, layer) {
    layer.on({
        mouseover: function(e) {
            const alpha2 = feature.properties.ISO_A2;
            const country = getCountryByAlpha2(alpha2, Object.values(currentYearData));
            if (country) {
                layer.bindPopup(`
                    <b>${country.name}</b><br>
                    Year: <b>${document.getElementById("yearLabel").innerText}</b><br>
                    Income Group: <b>${country.income}</b><br>
                    Region: ${country.region}
                `).openPopup();
            }
            layer.setStyle({ weight: 3, color: "#333", fillOpacity: 0.9 });
        },
        mouseout: function() {
            geojsonLayer.resetStyle(layer);
        }
    });
}

function updateMap(yearIndex) {
    const year = years[yearIndex];
    const countries = allData[year] || [];
    currentYearData = countries;

    document.getElementById("yearLabel").innerText = year;
    document.getElementById("tableYear").innerText = year;

    // Update GeoJSON colors
    if (geojsonLayer) {
        geojsonLayer.setStyle(styleFeature);
    }

    // Update table
    const tbody = document.getElementById("incomeTableBody");
    tbody.innerHTML = "";
    countries.forEach(c => {
        const badgeClass = c.income === "High Income" ? "high" :
                           c.income === "Upper-middle Income" ? "upper" :
                           c.income === "Lower-middle Income" ? "lower" : "low";
        tbody.innerHTML += `
            <tr>
                <td>${c.name}</td>
                <td>${c.region}</td>
                <td><span class="badge ${badgeClass}">${c.income}</span></td>
            </tr>
        `;
    });
}

// Initialize
(async () => {
    const geojson = await loadGeoJSON();
    const slider = document.getElementById("yearSlider");
    slider.max = years.length - 1;
    slider.value = 0;

    // Set initial year data
    currentYearData = allData[years[0]] || [];

    geojsonLayer = L.geoJSON(geojson, {
        style: styleFeature,
        onEachFeature: onEachFeature
    }).addTo(map);

    // Fit map to ASEAN bounds
    map.fitBounds(geojsonLayer.getBounds());

    updateMap(0);

    slider.addEventListener("input", function() {
        updateMap(parseInt(this.value));
    });
})();
</script>
{% endblock %}
