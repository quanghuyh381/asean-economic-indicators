{% extends "base.html" %}
{% block content %}
<h1>{{ country[0] }} <span style="font-size:16px;">({{ country[1] }} Region)</span></h1>
<a href="/">← Back to Dashboard</a>

<table>
    <thead>
        <tr>
            <th>Indicator</th>
            <th>Year</th>
            <th>Value</th>
            <th>Unit</th>
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ "{:,.2f}".format(row[2]) }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
